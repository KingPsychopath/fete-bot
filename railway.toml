# Railway config-as-code for fete-bot.
# Build, deploy, and persistent volume are all declared here.
# Standard storage contract:
# - Volume name: fete-bot-data
# - Mount path: /app/data
# - Size: managed in Railway UI (500MB on Hobby plan)

[build]
builder = "DOCKERFILE"

[deploy]
restartPolicyType = "ALWAYS"
numReplicas = 1
healthcheckPath = "/health"
healthcheckTimeout = 30
startCommand = "pnpm start"

[[deploy.volumes]]
name = "fete-bot-data"
mountPath = "/app/data"