# Railway config-as-code covers build and deploy settings for this service.
# Persistent volumes are attached in the Railway UI or API, not in this file.
# Standard storage contract for this repo:
# - Volume name: fete-bot-data
# - Mount path: /app/data
# - Service variable: RAILWAY_VOLUME_MOUNT_PATH=/app/data

[build]
builder = "DOCKERFILE"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1
healthcheckPath = "/health"
healthcheckTimeout = 30
overlapSeconds = 0
drainingSeconds = 30
